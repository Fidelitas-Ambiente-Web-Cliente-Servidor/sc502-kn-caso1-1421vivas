<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Rincón de Vivas</title>

  <!-- Bootstrap CSS (solo para el grid/layout) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="text-center py-4">
    <h1>El Rincón de Vivas</h1>
    <p>Cocina con productos frescos y reservas en línea</p>
  </header>

  <main class="container">

    <!-- Sección 1: Menú -->
    <section id="menu">
      <h2 class="text-center mb-3">Nuestro Menú</h2>

      <div class="text-center mb-4">
        <button class="btn-filtro" data-categoria="Todos">Todos</button>
        <button class="btn-filtro" data-categoria="Entrada">Entradas</button>
        <button class="btn-filtro" data-categoria="Plato Fuerte">Platos Fuertes</button>
        <button class="btn-filtro" data-categoria="Postre">Postres</button>
      </div>

      <div id="menu-container" class="row">
        <!-- Las cards .card-plato se generan desde js/app.js -->
      </div>
    </section>

    <!-- Sección 2: Reservas -->
    <section id="reservas" class="mt-5">
      <h2 class="text-center mb-3">Reserva tu Mesa</h2>

      <form id="form-reserva" class="row g-3 justify-content-center">

        <div class="col-md-6">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" class="form-control">
          <span class="error-campo" id="error-nombre"></span>
        </div>

        <div class="col-md-6">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="email" id="correo" name="correo" class="form-control">
          <span class="error-campo" id="error-correo"></span>
        </div>

        <div class="col-md-4">
          <label for="fecha" class="form-label">Fecha de reserva</label>
          <input type="date" id="fecha" name="fecha" class="form-control">
          <span class="error-campo" id="error-fecha"></span>
        </div>

        <div class="col-md-4">
          <label for="hora" class="form-label">Hora</label>
          <select id="hora" name="hora" class="form-control">
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
          </select>
        </div>

        <div class="col-md-4">
          <label for="personas" class="form-label">Número de personas</label>
          <input type="number" id="personas" name="personas" class="form-control">
          <span class="error-campo" id="error-personas"></span>
        </div>

        <div class="col-md-12">
          <label for="comentarios" class="form-label">Comentarios (opcional)</label>
          <textarea id="comentarios" name="comentarios" class="form-control"></textarea>
        </div>

        <div class="col-md-12 text-center">
          <button type="submit" id="btn-reservar" class="btn-reservar" disabled>Reservar</button>
        </div>

      </form>
    </section>

    <!-- Tabla de reservas -->
    <section id="lista-reservas" class="mt-5">
      <h2 class="text-center mb-3">Reservas Registradas</h2>

      <table class="table table-bordered text-center">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Personas</th>
          </tr>
        </thead>
        <tbody id="tabla-reservas">
          <!-- Las filas .fila-reserva se generan desde js/app.js -->
        </tbody>
      </table>

      <div id="resumen-reservas" class="resumen-reservas"></div>
    </section>

  </main>

  <footer class="text-center py-3 mt-5">
    <p>El Rincón de Vivas &copy; 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
